<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .box {
            background-color: red;
            display: flex;
            width: 200px;
            height: 500px;
            /* flex-direction: row-reverse; */
            flex-direction: row;
            flex-wrap: wrap;
            /* 主轴为水平方向，起点在左端，终点在右端（默认）*/
            /* justify-content: space-around; */
            /* justify-content: space-evenly; */
            align-items: center;
        }

        /* justify-content: flex-start;    /* 从主轴起点排列（默认）*/
        /* justify-content: flex-end;      从主轴终点排列 */
        /* justify-content: center;        居中排列 */
        /* justify-content: space-between; 两端对齐，中间平均分配 */
        /* justify-content: space-around;  每个子项两侧间距相等 */
        /* justify-content: space-evenly;  所有间距完全相等 */

        /* align-items: stretch;     拉伸填满（默认） */
        /* align-items: flex-start;  交叉轴起点对齐 */
        /* align-items: flex-end;    交叉轴终点对齐 */
        /* align-items: center;      交叉轴居中对齐 */
        .son1 {
            background-color: green;
            width: 100px;
            height: 100px;
        }

        .son2 {
            background-color: blue;
            width: 100px;
            height: 100px;
        }

        .son3 {
            background-color: yellow;
            width: 100px;
            height: 100px;
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="son1"></div>
        <div class="son2"></div>
        <div class="son3"></div>
    </div>
</body>

</html>
