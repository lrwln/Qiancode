<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width: 200px;
            height: 200px;
            background-color: pink;
            /* x y 模糊程度 阴影扩散程度 阴影颜色 */
            /* box-shadow: 0 0 10px 0 rgba(0, 0, 0, 0.5); */
            transition: .3s;
        }



        .box:hover {
            box-shadow: 0 0 20px 5px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body>
    <div class="box">

    </div>
</body>

</html>
