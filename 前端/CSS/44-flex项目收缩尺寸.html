<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width: 500px;
            height: 500px;
            background-color: blue;
            display: flex;
        }

        .item:nth-child(odd) {
            width: 100px;
            height: 100px;
            background-color: red;
            border-radius: 5px;
            flex: 2;
        }

        .item:nth-child(even) {
            width: 100px;
            height: 100px;
            background-color: lightblue;
            border-radius: 5px;
            flex: 1;
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="item"></div>
