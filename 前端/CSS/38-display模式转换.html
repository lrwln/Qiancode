<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        ul,
        ol {
            list-style: none;
        }

        a {
            text-decoration: none;
        }

        .subbar {
            width: 234px;
            height: 460px;
            background-color: #ccc;
            margin: 100px auto;
            padding: 10px 0;
        }

        .subbar ul li a {
            display: block;
            height: 42px;
            line-height: 42px;
            color: white;
            padding-left: 15px;
            transition: all 0.5s;
        }

        .subbar ul li a:hover {
            background-color: #ff7000;
        }

        .list {
            width: 400 px;
            height: 460px;
            background-color: #fff;
            margin: 100px auto;
            padding: 10px 0;
            border: 1px solid;
            font-size: 0;
        }

        .list a {
            display: inline-block;
            height: 42px;
            line-height: 42px;
            background-color: #ccc;
            color: white;
            border-radius: 10px;
            transition: all 0.5s;
            padding: 0 15px;
            /* margin: 4px; */
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="subbar">
        <ul>
            <li><a href="#">手机</a></li>
            <li><a href="#">电脑</a></li>
            <li><a href="#">家电</a></li>
            <li><a href="#">数码</a></li>
            <li><a href="#">家居</a></li>
            <li><a href="#">服装</a></li>
            <li><a href="#">母婴</a></li>
            <li><a href="#">美妆</a></li>
            <li><a href="#">图书</a></li>
            <li><a href="#">运动</a></li>
        </ul>
    </div>
    <div class="list">
        <a href="#">狄安娜</a>
        <a href="#">安妮</a>
        <a href="#">艾希</a>
        <a href="#">女警</a>
        <a href="#">薇恩</a>

    </div>
</body>

</html>
