<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 额外标签法 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .box {
            width: 666px;
            border: 1px solid #000;
            margin: 0 auto;
        }

        .son1 {
            width: 200px;
            height: 200px;
            background-color: red;
            float: left;
        }

        .son2 {
            width: 200px;
            height: 200px;
            background-color: blue;
            float: left;
        }

        .footer {
            width: 100%;
            height: 50px;
            background-color: black;
        }

        .clear {
            clear: both;
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="son1"></div>
        <div class="son2"></div>
        <div class="clear"></div>
    </div>
    <div class="footer"></div>
</body>

</html>
